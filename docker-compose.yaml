version: '3.8'

services:
  # Container 1: O Microsserviço C#
  meu-backend:
    container_name: microsservico-net
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80" # Mapeia a porta 5000 da sua máquina física para a porta 80 interna do container
    depends_on:
      fila-rabbitmq:
        condition: service_healthy # Espera o RabbitMQ estar pronto (não apenas iniciado)
      fila-kafka:
        condition: service_healthy # Espera o Kafka estar pronto

  # Container 2: RabbitMQ com Painel de Gerenciamento Visual
  fila-rabbitmq:
    image: rabbitmq:3-management
    container_name: fila-rabbitmq
    ports:
      - "5672:5672"   # Porta de comunicação interna de dados (AMQP)
      - "15672:15672" # Porta do painel de controle web (Dashboard)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Container 3: Apache Kafka em modo KRaft (sem Zookeeper)
  fila-kafka:
    image: apache/kafka:3.8.0
    container_name: fila-kafka
    ports:
      - "9092:9092" # Porta para clientes rodando na máquina física (dotnet watch run)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@fila-kafka:9093
      # INTERNO (19092): usado pelos containers da rede do compose
      # EXTERNO (9092): usado pela sua máquina física via localhost
      KAFKA_LISTENERS: INTERNO://:19092,CONTROLLER://:9093,EXTERNO://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNO://fila-kafka:19092,EXTERNO://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNO:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNO:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNO
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # O tópico é criado na primeira publicação
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server fila-kafka:19092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20

  # Container 4: Kafka UI — painel visual para tópicos, mensagens e consumer groups
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080" # http://localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: fila-kafka:19092
    depends_on:
      fila-kafka:
        condition: service_healthy
